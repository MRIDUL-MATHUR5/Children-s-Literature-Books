<!DOCTYPE html>
<html>

<head>

<title>Year Articles</title>

<style>

body{
font-family:Arial;
margin:40px;
max-width:1000px;
margin:auto;
background:#f8f9fb;
}

h1{
color:#1f3c88;
}

h3{
margin-top:30px;
}

.pdf{
display:flex;
justify-content:space-between;
padding:10px;
background:white;
margin:8px 0;
border-radius:6px;
}

.download{
background:#2e4fa2;
color:white;
padding:6px 12px;
text-decoration:none;
border-radius:4px;
}

</style>

</head>

<body>

<h1 id="title"></h1>

<div id="list"></div>

<script>

// Get year from URL
const params = new URLSearchParams(window.location.search);
const year = params.get("year");

// Title
document.getElementById("title").innerText = year + " Journal Articles";

// 👇 CHANGE THIS DATA FOR EACH YEAR
let data = [];

if(year === "1981"){

data = [
  {
    section: "Oct-Dec Vol 1 No 1",
    files: [
      {
        name: "1.Oct-Dec 1981 Nirankar Dev Sewak History and Devlopment of Child.pdf",
        link: "https://drive.google.com/file/d/1Kaln5d0PfGkIMeretaMdWunkEzgaQkU2/view"
      },
      {
        name: "2. Shankar Author and Illustrator for Children by Alaka Shankar",
        link: "https://drive.google.com/file/d/1Fw_1cfCR5d0JPfMnS-m63eNsdKOXEsMW/view"
      },
      {
        name: "3 Writing fiction for children by Manorama Jafa",
        link: "https://drive.google.com/file/d/1csxxSJYHpxyOVV170OVlmdIRBDgmWi1j/view"
      }
    ]
  }
];

}

// Render
let html = "";

data.forEach(section => {

  html += `<h3>${section.section}</h3>`;

  section.files.forEach(file => {
    html += `
      <div class="pdf">
        <span>${file.name}</span>
        <a class="download" href="${file.link}">Download</a>
      </div>
    `;
  });

});

document.getElementById("list").innerHTML = html;

</script>

</body>
</html>
