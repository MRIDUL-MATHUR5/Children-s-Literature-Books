<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AWIC Journal Articles</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy:   #1a2560;
      --indigo: #2f3e9e;
      --gold:   #c9a84c;
      --cream:  #faf8f3;
      --light:  #f0f2fa;
      --text:   #2b2b2b;
      --muted:  #6b7280;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 48px;
      height: 68px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 900;
      color: var(--navy);
      letter-spacing: 2px;
      text-decoration: none;
    }

    .nav-logo span { color: var(--gold); }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1.5px solid #dde2f5;
      transition: all 0.2s;
    }

    .back-btn:hover {
      color: var(--navy);
      border-color: var(--navy);
      background: var(--light);
    }

    /* HERO BANNER */
    .page-hero {
      background: var(--navy);
      padding: 56px 80px 64px;
      position: relative;
      overflow: hidden;
    }

    .page-hero::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0;
      width: 100%; height: 60px;
      background: var(--cream);
      clip-path: polygon(0 100%, 100% 100%, 100% 0);
    }

    /* big decorative year number in background */
    .hero-year-bg {
      position: absolute;
      right: 60px;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Playfair Display', serif;
      font-size: 160px;
      font-weight: 900;
      color: rgba(255,255,255,0.04);
      line-height: 1;
      user-select: none;
      pointer-events: none;
    }

    .hero-tag {
      display: inline-block;
      background: var(--gold);
      color: var(--navy);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 16px;
    }

    .page-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(30px, 5vw, 52px);
      color: white;
      font-weight: 900;
      line-height: 1.15;
      max-width: 600px;
    }

    .page-hero p {
      color: rgba(255,255,255,0.6);
      font-size: 15px;
      margin-top: 12px;
    }

    /* CONTENT */
    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 56px 40px 80px;
    }

    /* "No data" state */
    .no-data {
      text-align: center;
      padding: 80px 40px;
      color: var(--muted);
    }

    .no-data h2 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--navy);
      margin-bottom: 12px;
    }

    .no-data a {
      display: inline-block;
      margin-top: 24px;
      background: var(--indigo);
      color: white;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }

    /* SECTION HEADING (quarter label) */
    .quarter-heading {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 40px 0 16px;
    }

    .quarter-heading:first-child { margin-top: 0; }

    .quarter-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--gold);
      flex-shrink: 0;
    }

    .quarter-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--navy);
      font-weight: 700;
    }

    .quarter-line {
      flex: 1;
      height: 1px;
      background: #dde2f5;
    }

    /* ARTICLE CARDS */
    .article-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: white;
      border: 1.5px solid #eaedf7;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 10px;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }

    .article-card:hover {
      border-color: var(--indigo);
      box-shadow: 0 4px 16px rgba(47,62,158,0.10);
      transform: translateX(4px);
    }

    .article-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--light);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .article-name {
      flex: 1;
      font-size: 14.5px;
      color: var(--text);
      line-height: 1.5;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--navy);
      color: white;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.2s;
    }

    .download-btn:hover {
      background: var(--indigo);
      transform: translateY(-1px);
    }

    /* ARTICLE COUNT BADGE */
    .count-badge {
      display: inline-block;
      background: var(--light);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 32px;
    }

    /* FOOTER */
    footer {
      background: var(--navy);
      color: rgba(255,255,255,0.45);
      text-align: center;
      padding: 24px;
      font-size: 13px;
    }

    footer span { color: var(--gold); }

    @media (max-width: 640px) {
      .navbar { padding: 0 20px; }
      .page-hero { padding: 40px 24px 56px; }
      .content { padding: 40px 20px 60px; }
      .article-card { flex-direction: column; align-items: flex-start; }
      .download-btn { width: 100%; justify-content: center; }
      .hero-year-bg { display: none; }
    }
  </style>
</head>

// ── RENDER ──
const params = new URLSearchParams(window.location.search);
const year = params.get("year") || "";

// Set hero
document.getElementById("heroTitle").textContent = year + " Journal Articles";
document.getElementById("heroBgYear").textContent = year;
document.getElementById("heroSubtitle").textContent =
  "Browse and download archived journal articles from " + year + ".";

// Update page title
document.title = "AWIC — " + year + " Articles";

const data = allData[year];
const listEl = document.getElementById("articleList");

if (!data || data.length === 0) {
  listEl.innerHTML = `
    <div class="no-data">
      <h2>No articles found for ${year}</h2>
      <p>Articles for this year have not been added yet, or this year is outside the available archive.</p>
      <a href="index.html">← Back to Home</a>
    </div>`;
} else {
  // Count total articles
  const total = data.reduce((sum, s) => sum + s.files.length, 0);
  let html = `<div class="count-badge">${total} article${total !== 1 ? 's' : ''} in ${data.length} issue${data.length !== 1 ? 's' : ''}</div>`;

  data.forEach(section => {
    html += `
      <div class="quarter-heading">
        <div class="quarter-dot"></div>
        <div class="quarter-title">${section.section}</div>
        <div class="quarter-line"></div>
      </div>`;
    section.files.forEach(file => {
      html += `
        <div class="article-card">
          <div class="article-icon">📄</div>
          <div class="article-name">${file.name}</div>
          <a class="download-btn" href="${file.link}" target="_blank">
            Download ↗
          </a>
        </div>`;
    });
  });

  listEl.innerHTML = html;
}
