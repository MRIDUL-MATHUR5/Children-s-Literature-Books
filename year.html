<!DOCTYPE html>
<html>

<head>

<title>Year Articles</title>

<style>

body{
font-family:Arial;
margin:40px;
max-width:1000px;
margin:auto;
background:#f8f9fb;
}

h1{
color:#1f3c88;
}

h3{
margin-top:30px;
}

.pdf{
display:flex;
justify-content:space-between;
padding:10px;
background:white;
margin:8px 0;
border-radius:6px;
}

.download{
background:#2e4fa2;
color:white;
padding:6px 12px;
text-decoration:none;
border-radius:4px;
}

</style>

</head>

<body>

<h1 id="title"></h1>

<div id="list"></div>

<script>

// Get year from URL
const params = new URLSearchParams(window.location.search);
const year = params.get("year");

// Title
document.getElementById("title").innerText = year + " Journal Articles";

// 👇 CHANGE THIS DATA FOR EACH YEAR
let data = [];

if(year === "1981"){

data = [
  {
    section: "Oct-Dec Vol 1 No 1",
    files: [
      {
        name: "Nirankar Dev Sewak History and Devlopment of Child",
        link: "https://drive.google.com/file/d/1Kaln5d0PfGkIMeretaMdWunkEzgaQkU2/view"
      },
      {
        name: "Shankar Author and Illustrator for Children by Alaka Shankar",
        link: "https://drive.google.com/file/d/1Fw_1cfCR5d0JPfMnS-m63eNsdKOXEsMW/view"
      },
      {
        name: "Writing fiction for children by Manorama Jafa",
        link: "https://drive.google.com/file/d/1csxxSJYHpxyOVV170OVlmdIRBDgmWi1j/view"
      }
    ]
  }
];

}
  if(year === "1982"){

data = [
  {
    section: "Jan-Mar Vol 1 No 2",
    files: [
      {
        name: "Satyjit Ray Author & Illustrator for children by Lila Majumdar",
        link: "https://drive.google.com/file/d/1rNiTTuAIokahTut7Ys35w7gbcxDCubos/view"
      },
      {
        name: "Children’s Magazines in Gujarat by Arvind P. Dave",
        link: "https://drive.google.com/file/d/1ofIAxZcQ6CBEwd3BNAegkUEDMl9mq6Tm/view"
      },
      {
        name: "Panchatantra – A Passage Through Centuries by Manorama Jafa",
        link: "https://drive.google.com/file/d/172r9vLfkVF2GEGqIscbX1Nl7tgHaYgdk/view"
      }
    ]
  },
  {
    section: "July-Sept Vol 1 No 4",
    files: [
      {
        name: "Children’s Poetry in Indian Laguage by Nirankar Dev Sewak",
        link: "https://drive.google.com/file/d/15yi-fh83T1N-7z8VGC5viaoNL_9h6XZr/view"
      },
      {
        name: "The Role of Children’s Books in Integranting Handicapped Children into Everday Life by Tordis orjasaetez",
        link: "https://drive.google.com/file/d/18tHmhXLAp067AjauVVEfESSC-HesqzlH/view"
      }
    ]
  },
  {
    section: "Oct-Dec Vol 2 No 1",
    files: [
      {
        name: "Development of Children’s Literature in Oriya by Jagannath Mohanty",
        link: "https://drive.google.com/file/d/1_g0baIEIW240vRrPbawQfp4wN6mJW3Z5/view"
      },
      {
        name: "Childrens Poet Harindranath Chattopadhyaya by S.P. Chatterjea",
        link: "https://drive.google.com/file/d/125GYUh9YdvN9ZeUO_d2sShYktZXejoeQ/view"
      },
      {
        name: "Books for Tiny Tots by Manorama Jafa",
        link: "https://drive.google.com/file/d/1UlRi13wniQd9ig6-SjKGQNBnNUpvUf-s/view"
      },
      {
        name: "Dialogue The Spice of Fiction by Vrinda Kumble",
        link: "https://drive.google.com/file/d/1UlRi13wniQd9ig6-SjKGQNBnNUpvUf-s/view"
      }
    ]
  }
];

}

// Render
let html = "";

data.forEach(section => {

  html += `<h3>${section.section}</h3>`;

  section.files.forEach(file => {
    html += `
      <div class="pdf">
        <span>${file.name}</span>
        <a class="download" href="${file.link}" target="_blank">Download</a>
      </div>
    `;
  });

});

document.getElementById("list").innerHTML = html;

</script>

</body>
</html>
