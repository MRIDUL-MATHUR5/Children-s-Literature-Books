<!DOCTYPE html>
<html>

<head>
<title>Photo Gallery</title>

<style>
body{
  font-family: Arial;
  margin: 40px auto;
  max-width: 1100px;
  background: #f8f9fb;
}

h1{
  color:#1f3c88;
  margin-bottom: 20px;
}

.gallery{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.image-card{
  overflow: hidden;
  border-radius: 12px;
  background: white;
  padding: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.image-card img{
  width: 100%;
  border-radius: 10px;
  transition: transform 0.3s ease;
  cursor: pointer;
}

.image-card:hover img{
  transform: scale(1.05);
}

.buttons{
  display:flex;
  justify-content: space-between;
  margin-top: 8px;
}

.buttons a{
  text-decoration:none;
  background:#1f3c88;
  color:white;
  padding:6px 12px;
  border-radius:6px;
  font-size:12px;
}

.buttons a:hover{
  background:#16306b;
}

/* 🔥 LIGHTBOX */
.lightbox{
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}

.lightbox.active{
  display:flex;
}
</style>

</head>

<body>
